    <body>
        <header data-brand-header>
            <h1><a href="." id="eas-tools-logo"></a></h1>
            <nav id="tab-set">
                <div id="nav-buttons">
                    <!-- will get filled in by js below -->
                </div>
                <div id="nav-selector" style="display: none;">
                    <select id="nav-select">
                        <!-- will get filled in by js below -->
                    </select>
                </div>
            </nav>
        </header>
        <section data-brand-hero class="ztr-hero-wrap" aria-label="Module overview"></section>
        <main>
            <div class="ztr-embed" data-tool-embed>
                <iframe id="tool-frame"
                        title="EAS Lab — tool workspace"
                        src="https://octopus-app-t96ou.ondigitalocean.app/index.html?tool=decoder"
                        allow="microphone; clipboard-read; clipboard-write; fullscreen; autoplay"
                        loading="eager"
                        referrerpolicy="no-referrer-when-downgrade"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-modals allow-popups-to-escape-sandbox"></iframe>
            </div>
        </main>
        <footer></footer>
        <script src="assets/js/brand-config.js"></script>
        <script src="coi-serviceworker.js"></script>
        <script src="assets/js/footer.js"></script>
        <script>
            // Drive the embedded tool iframe from nav clicks. All tool logic
            // lives in the upstream app loaded via the iframe; this page is
            // the brand shell + nav.
            (function () {
                const TOOL_HOST = "https://octopus-app-t96ou.ondigitalocean.app/index.html";
                const DEFAULT_TOOL = "decoder";
                const navLabels = (window.BRAND && window.BRAND.nav) || {};
                const TOOLS = {
                    decoder:    { label: navLabels.decoder    || "Decode" },
                    encoder:    { label: navLabels.encoder    || "Generate" },
                    crawl:      { label: navLabels.crawl      || "Crawl Builder" },
                    splicer:    { label: navLabels.splicer    || "Audio Assembly" },
                    phoneme:    { label: navLabels.phoneme    || "Phoneme Lab" },
                    normalizer: { label: navLabels.normalizer || "Product Normalizer" },
                    muxer:      { label: navLabels.muxer      || "Artifacts" }
                };

                const frame = document.getElementById("tool-frame");
                const navButtons = document.getElementById("nav-buttons");
                const navSelect = document.getElementById("nav-select");
                const toolOrder = Object.keys(TOOLS);

                if (navButtons) {
                    navButtons.setAttribute("role", "tablist");
                    navButtons.setAttribute("aria-label", "Tool navigation");
                    Object.entries(TOOLS).forEach(([key, { label }]) => {
                        const btn = document.createElement("button");
                        btn.type = "button";
                        btn.id = `tab-${key}`;
                        btn.dataset.tool = key;
                        btn.textContent = label;
                        btn.setAttribute("role", "tab");
                        navButtons.appendChild(btn);
                    });
                }
                if (navSelect) {
                    Object.entries(TOOLS).forEach(([key, { label }]) => {
                        const opt = document.createElement("option");
                        opt.value = key;
                        opt.textContent = label;
                        navSelect.appendChild(opt);
                    });
                }

                const buttons = document.querySelectorAll("button[data-tool]");

                const buildSrc = (tool) => {
                    const url = new URL(TOOL_HOST);
                    url.searchParams.set("tool", tool);
                    return url.toString();
                };

                const activate = (target, { updateHistory = true } = {}) => {
                    const tool = TOOLS[target] ? target : DEFAULT_TOOL;
                    if (frame) {
                        const desired = buildSrc(tool);
                        if (frame.src !== desired) frame.src = desired;
                    }
                    buttons.forEach((btn) => {
                        const isActive = btn.dataset.tool === tool;
                        btn.classList.toggle("active", isActive);
                        btn.setAttribute("aria-selected", String(isActive));
                        btn.setAttribute("aria-current", isActive ? "page" : "false");
                        btn.tabIndex = isActive ? 0 : -1;
                    });
                    if (navSelect && navSelect.value !== tool) navSelect.value = tool;
                    if (updateHistory) {
                        const newParams = new URLSearchParams(window.location.search);
                        newParams.set("tool", tool);
                        window.history.replaceState({}, "", `${window.location.pathname}?${newParams}`);
                    }
                };

                buttons.forEach((btn) => {
                    btn.addEventListener("click", () => activate(btn.dataset.tool));
                    btn.addEventListener("keydown", (event) => {
                        const currentIndex = toolOrder.indexOf(btn.dataset.tool);
                        if (currentIndex === -1) return;
                        let targetIndex = null;
                        if (event.key === "ArrowRight") targetIndex = (currentIndex + 1) % toolOrder.length;
                        if (event.key === "ArrowLeft")  targetIndex = (currentIndex - 1 + toolOrder.length) % toolOrder.length;
                        if (event.key === "Home")       targetIndex = 0;
                        if (event.key === "End")        targetIndex = toolOrder.length - 1;
                        if (targetIndex === null) return;
                        event.preventDefault();
                        const nextTool = toolOrder[targetIndex];
                        activate(nextTool);
                        document.querySelector(`button[data-tool="${nextTool}"]`)?.focus();
                    });
                });
                if (navSelect) {
                    navSelect.addEventListener("change", () => activate(navSelect.value));
                }

                const params = new URLSearchParams(window.location.search);
                const initial = params.get("tool");
                activate(initial && TOOLS[initial] ? initial : DEFAULT_TOOL, { updateHistory: false });

                window.addEventListener("deepLinkOpen", (event) => {
                    const payload = event && (event.detail || event.data);
                    let tool = null;
                    if (typeof payload === "string") {
                        try { tool = JSON.parse(payload).tool; } catch { tool = null; }
                    } else if (payload && typeof payload === "object") {
                        tool = payload.tool;
                    }
                    if (tool && TOOLS[tool]) activate(tool);
                });

                if (window.EASBridge) {
                    window.EASBridge.on("muxer:activate", () => activate("muxer"));
                    window.EASBridge.on("muxer:deactivate", () => activate("decoder"));
                }
            })();
        </script>
        <script src="assets/js/announcements.js"></script>
    </body>
